version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      # Note: For production use, place database/supabase credentials in a .env file and reference them here if needed.

  ml_service:
    build:
      context: ./ml_service
    ports:
      - "8000:8000"
