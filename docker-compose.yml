version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - PORT=3001
  ml_service:
    build:
      context: ./ml_service
    ports:
      - "8000:8000"
